version: '3.8'

services:
  backend-java:
    build: ./backend-java
    ports:
      - "5000:5000"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - ML_SERVICE_URL=http://ml-service:8000
    networks:
      - luxiq-network

  ml-service:
    build: ./ml-service
    ports:
      - "8000:8000"
    networks:
      - luxiq-network

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend-java
    networks:
      - luxiq-network

networks:
  luxiq-network:
    driver: bridge
